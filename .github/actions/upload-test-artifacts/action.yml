# Composite action to upload test artifacts (JUnit XML) to GitHub Actions.
name: Upload test artifacts
description: Upload test artifacts (JUnit XML) to GitHub Actions.

inputs:
  test-artifacts-dir:
    description: "Directory containing test artifact files"
    default: "test-artifacts"
  artifact-name:
    description: "Name for the GitHub Actions artifact upload"
    default: "test-artifacts-${{ github.job }}"
  gcs-upload-uri:
    description: "GCS location prefix where the test artifacts should be uploaded"
    default: "gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}"
  metadata:
    description: "JSON string containing job-level metadata"
    default: ""
  inputs_json:
    description: "JSON string of workflow inputs"
    default: "{}"
  matrix_json:
    description: "JSON string of matrix parameters"
    default: "{}"
  env_json:
    description: "JSON string of environment variables"
    default: "{}"
  custom_json:
    description: "JSON string of custom metadata"
    default: "{}"
  artifact-log-limit:
    description: "Maximum number of artifact file names to print to logs and the step summary"
    default: "200"

runs:
  using: "composite"

  steps:
    - name: Check for test artifacts
      id: check-artifacts
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        TEST_ARTIFACTS_DIR: ${{ inputs.test-artifacts-dir }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
      run: |
        # Each composite step runs in a fresh Bash shell. Disable inherited
        # xtrace here so artifact bookkeeping does not spam the test logs.
        { set +x; } 2>/dev/null
        set -euo pipefail
        close_group=0
        if [[ "${GITHUB_ACTIONS:-}" == "true" ]]; then
          echo "::group::Check test artifacts"
          close_group=1
        fi
        # Always close the GitHub log group, even if the Python helper fails.
        finish_group() {
          if [[ "$close_group" == "1" ]]; then
            echo "::endgroup::"
          fi
        }
        trap finish_group EXIT

        python3 "$ACTION_PATH/upload_test_artifacts.py" check \
          --test-artifacts-dir "$TEST_ARTIFACTS_DIR" \
          --run-attempt "$RUN_ATTEMPT"

    - name: Generate metadata file
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUTS_JSON: ${{ inputs.inputs_json }}
        MATRIX_JSON: ${{ inputs.matrix_json }}
        ENV_JSON: ${{ inputs.env_json }}
        CUSTOM_JSON: ${{ inputs.custom_json }}
        EXPLICIT_METADATA: ${{ inputs.metadata }}
        TEST_ARTIFACTS_DIR: ${{ inputs.test-artifacts-dir }}
        GITHUB_JOB_ID: ${{ job.check_run_id }}
      run: |
        { set +x; } 2>/dev/null
        set -euo pipefail
        close_group=0
        if [[ "${GITHUB_ACTIONS:-}" == "true" ]]; then
          echo "::group::Generate test artifact metadata"
          close_group=1
        fi
        # Always close the GitHub log group, even if metadata generation fails.
        finish_group() {
          if [[ "$close_group" == "1" ]]; then
            echo "::endgroup::"
          fi
        }
        trap finish_group EXIT

        python3 "$ACTION_PATH/upload_test_artifacts.py" metadata \
          --test-artifacts-dir "$TEST_ARTIFACTS_DIR"

    - name: Upload test artifacts to GCS
      if: steps.check-artifacts.outputs.has_artifacts == 'true'
      shell: bash
      continue-on-error: true
      env:
        ACTION_PATH: ${{ github.action_path }}
        TEST_ARTIFACTS_DIR: ${{ inputs.test-artifacts-dir }}
        GCS_UPLOAD_URI: ${{ inputs.gcs-upload-uri }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        PADDED_ATTEMPT: ${{ steps.check-artifacts.outputs.padded_attempt }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        ARTIFACT_LOG_LIMIT: ${{ inputs.artifact-log-limit }}
      run: |
        { set +x; } 2>/dev/null
        set -euo pipefail
        close_group=0
        if [[ "${GITHUB_ACTIONS:-}" == "true" ]]; then
          echo "::group::Upload test artifacts to GCS"
          close_group=1
        fi
        # Always close the GitHub log group, even if upload or zip fails.
        finish_group() {
          if [[ "$close_group" == "1" ]]; then
            echo "::endgroup::"
          fi
        }
        trap finish_group EXIT

        artifact_name="$INPUT_ARTIFACT_NAME-$PADDED_ATTEMPT"
        WF_NAME="$GITHUB_WORKFLOW"
        # Workflow names can contain '/', which would become extra GCS path
        # components. Keep the historical URI shape by replacing them.
        SAFE_WF_NAME="${WF_NAME//\//-}"
        REAL_URI="${GCS_UPLOAD_URI//$WF_NAME/$SAFE_WF_NAME}"
        destination_uri="$REAL_URI/$artifact_name/test-artifacts.zip"

        python3 "$ACTION_PATH/upload_test_artifacts.py" prepare \
          --test-artifacts-dir "$TEST_ARTIFACTS_DIR" \
          --artifact-name "$artifact_name" \
          --destination-uri "$destination_uri" \
          --log-limit "$ARTIFACT_LOG_LIMIT"

        # The subshell keeps the `cd` local to the zip command. `-q` stops zip
        # from printing one line per file.
        (
          cd "$TEST_ARTIFACTS_DIR"
          zip -qr "$GITHUB_WORKSPACE/test-artifacts.zip" .
        )
        zip_bytes="$(
          python3 "$ACTION_PATH/upload_test_artifacts.py" zip-size \
            --zip-path "$GITHUB_WORKSPACE/test-artifacts.zip"
        )"
        echo "Created test-artifacts.zip ($zip_bytes bytes)."

        gcloud storage cp "$GITHUB_WORKSPACE/test-artifacts.zip" "$destination_uri"
        echo "Uploaded test artifacts to $destination_uri"
