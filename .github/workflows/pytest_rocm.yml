# CI - Pytest ROCm
#
# This workflow runs the ROCm tests with Pytest in ROCm team's GHCR containers.
# It can be triggered manually via workflow_dispatch or called by other workflows
# via workflow_call.
#
# It consists of the following job:
# run-tests:
#    - Runs in ROCm team's container (ghcr.io/rocm/jax-base-ubu24-rocm*:latest)
#    - Downloads the JAX and jaxlib wheels from GCS, and ROCm plugins from latest release.
#    - Executes the `run_pytest_rocm.sh` script, which performs the following actions:
#      - Installs the downloaded wheel artifacts.
#      - Runs the ROCm tests with Pytest.
name: CI - Pytest ROCm

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Which runner should the workflow run on?"
        type: choice
        default: "linux-x86-64-4gpu-amd"
        options:
          - "linux-x86-64-1gpu-amd"
          - "linux-x86-64-4gpu-amd"
          - "linux-x86-64-8gpu-amd"
      python:
        description: "Which Python version to use?"
        type: choice
        default: "3.11"
        options:
          - "3.11"
          - "3.12"
      rocm-version:
        description: "Which ROCm version to test?"
        type: choice
        default: "7.2.0"
        options:
          - "7.2.0"
      rocm-tag:
        description: "ROCm tag for container image (e.g., rocm720)"
        type: string
        default: "rocm720"
      jaxlib-version:
        description: "Which jaxlib version to use? (head/pypi_latest)"
        type: choice
        default: "head"
        options:
          - "head"
          - "pypi_latest"
      skip-download-jaxlib-and-plugins-from-gcs:
        description: "Whether to skip downloading the jaxlib and plugins from GCS (e.g for testing a jax only release)"
        type: choice
        default: '0'
        options:
          - '0'
          - '1'
      gcs_download_uri:
        description: "GCS location prefix from where the artifacts should be downloaded"
        type: string
        default: 'gs://jax-nightly-artifacts/latest'
      halt-for-connection:
        description: 'Should this workflow run wait for a remote connection?'
        type: string
        default: 'no'
  workflow_call:
    inputs:
      call-id:
        description: "Unique ID from caller job (for S3 prefix)"
        type: string
        required: false
        default: ""
      runner:
        description: "Which runner should the workflow run on?"
        type: string
        default: "linux-x86-64-4gpu-amd"
      python:
        description: "Which Python version to use?"
        type: string
        default: "3.11"
      rocm-version:
        description: "Which ROCm version to test?"
        type: string
        default: "7.2.0"
      rocm-tag:
        description: "ROCm tag for container image (e.g., rocm720)"
        type: string
        default: "rocm720"
      jaxlib-version:
        description: "Which jaxlib version to use? (head/pypi_latest)"
        type: string
        default: "head"
      skip-download-jaxlib-and-plugins-from-gcs:
        description: "Whether to skip downloading the jaxlib and plugins from GCS (e.g for testing a jax only release)"
        default: '0'
        type: string
      gcs_download_uri:
        description: "GCS location prefix from where the artifacts should be downloaded"
        default: 'gs://jax-nightly-artifacts/latest'
        type: string
permissions:
  id-token: write
  contents: read

env:
  UV_DEFAULT_INDEX: "https://us-python.pkg.dev/ml-oss-artifacts-published/pypi-mirror/simple"

jobs:
  run-tests:
    defaults:
      run:
        # Set the shell to bash as GitHub actions run with /bin/sh by default
        shell: bash
    runs-on: ${{ inputs.runner }}
    continue-on-error: true
    # Run in ROCm team's GHCR container with GPU access
    container:
      image: ghcr.io/rocm/jax-base-ubu24.${{ inputs.rocm-tag }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --device=/dev/kfd --device=/dev/dri --security-opt seccomp=unconfined --group-add video --shm-size 64G --env-file /etc/podinfo/gha-gpu-isolation-settings
    name: "${{ (contains(inputs.runner, '1gpu') && '1gpu') ||
        (contains(inputs.runner, '4gpu') && '4gpu') ||
        (contains(inputs.runner, '8gpu') && '8gpu') }}, ROCm ${{ inputs.rocm-version }}, py${{ inputs.python }}"

    env:
      JAXCI_HERMETIC_PYTHON_VERSION: "${{ inputs.python }}"
      JAXCI_PYTHON: "python${{ inputs.python }}"
      JAXCI_ENABLE_X64: "0"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download JAX ROCm wheels
        uses: ./.github/actions/download-jax-rocm-wheels
        with:
          python: ${{ inputs.python }}
          rocm-version: ${{ inputs.rocm-version }}
          jaxlib-version: ${{ inputs.jaxlib-version }}
          skip-download-jaxlib-and-plugins-from-gcs: ${{ inputs.skip-download-jaxlib-and-plugins-from-gcs }}
          gcs_download_uri: ${{ inputs.gcs_download_uri }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Python dependencies
        run: |
          $JAXCI_PYTHON -m pip install uv~=0.5.30
          $JAXCI_PYTHON -m uv pip install -r build/test-requirements.txt
      # Halt for testing
      - name: Wait For Connection
        uses: google-ml-infra/actions/ci_connection@7f5ca0c263a81ed09ea276524c1b9192f1304e3c
        with:
          halt-dispatch-input: ${{ inputs.halt-for-connection }}
      - name: Run Pytest ROCm tests
        timeout-minutes: 120
        run: ./ci/run_pytest_rocm.sh
      - name: Archive logs
        if: always()
        run: |
          set -euo pipefail
          tar -czf logs.tar.gz logs
      - name: Generate run manifest
        if: always()
        env:
          INPUT_RUNNER: ${{ inputs.runner }}
          INPUT_PYTHON: ${{ inputs.python }}
          INPUT_ROCM_VERSION: ${{ inputs.rocm-version }}
          INPUT_ROCM_TAG: ${{ inputs.rocm-tag }}
        run: |
          PKGS="$($JAXCI_PYTHON -m pip list | grep -E '^(jax|jaxlib)|pjrt|plugin' || true)"
          PKGS_ONE_LINE="$(printf "%s" "$PKGS" | tr '\n' '|' | sed 's/|$//')"
          WHEELS="$(sha256sum dist/*.whl 2>/dev/null || true)"
          WHEELS_ONE_LINE="$(printf "%s" "$WHEELS" | tr '\n' '|' | sed 's/|$//')"

          REPO="rocm/jax-base-ubu24.${INPUT_ROCM_TAG}"
          IMAGE="ghcr.io/${REPO}:latest"
          BASE="https://ghcr.io"
          DIGEST=""
          TOKEN="$(curl -fsSL "${BASE}/token?service=ghcr.io&scope=repository:${REPO}:pull" \
            | sed -n 's/.*"token":"\([^"]*\)".*/\1/p' || true)"
          if [ -n "${TOKEN}" ]; then
            DIGEST="$(curl -fsSL -D - \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              "${BASE}/v2/${REPO}/manifests/latest" -o /dev/null \
              | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}' \
              | tr -d $'\r' || true)"
          fi

          cat > logs/run-manifest.json << EOF
          {
            "schema_version": 1,
            "github_repository": "${{ github.repository }}",
            "github_workflow": "${{ github.workflow }}",
            "github_job": "${{ github.job }}",
            "github_run_id": "${{ github.run_id }}",
            "github_run_attempt": "${{ github.run_attempt }}",
            "github_run_number": "${{ github.run_number }}",
            "github_event_name": "${{ github.event_name }}",
            "github_ref": "${{ github.ref }}",
            "github_ref_name": "${{ github.ref_name }}",
            "github_sha": "${{ github.sha }}",
            "runner": "${INPUT_RUNNER}",
            "python_version": "${INPUT_PYTHON}",
            "rocm_version": "${INPUT_ROCM_VERSION}",
            "base_image_name": "${IMAGE}",
            "base_image_digest": "${DIGEST}",
            "jax_packages_raw": "${PKGS_ONE_LINE}",
            "wheels_sha_raw": "${WHEELS_ONE_LINE}"
          }
          EOF
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::661452401056:role/jax-ci-amd-s3-oidc
          aws-region: us-east-1
      - name: Upload test artifacts to AMD S3
        if: always()
        env:
          RUN_KEY: ${{ github.repository }}/${{ github.run_id }}/${{ github.run_attempt }}
          JOB_KEY: ${{ inputs.call-id || github.job }}
          COMBO: py${{ inputs.python }}-rocm${{ inputs.rocm-version }}-${{ inputs.runner }}
        run: |
          set -euo pipefail
          PREFIX="jax-test-logs/${RUN_KEY}/${JOB_KEY}/${COMBO}/"
          $JAXCI_PYTHON -m pip install -q boto3
          $JAXCI_PYTHON - <<PY
          import boto3, os; s3=boto3.client("s3"); BUCKET = "jax-ci-amd"
          s3.upload_file("logs.tar.gz", BUCKET, "${PREFIX}"+"logs.tar.gz")
          s3.upload_file("logs/run-manifest.json", BUCKET, "${PREFIX}"+"run-manifest.json")
          s3.put_object(Bucket=BUCKET, Key="${PREFIX}"+"_SUCCESS", Body=b"")
          PY

