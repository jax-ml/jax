name: ROCm CI Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.mode.name }})
    runs-on: linux-x86-64-4gpu-amd
    strategy:
      fail-fast: false
      matrix:
        mode:
          - {name: "py3.11", python_version: "3.11", config: ""}
          - {name: "py3.12", python_version: "3.12", config: ""}
          - {name: "py3.13", python_version: "3.13", config: ""}
          - {name: "py3.14", python_version: "3.14", config: ""}
    container:
      image: rocm/tensorflow-build@sha256:7fcfbd36b7ac8f6b0805b37c4248e929e31cf5ee3af766c8409dd70d5ab65faa
      options: >-
        -v /data/ci-cert.crt:/certs/ci-cert.crt:ro
        -v /data/ci-cert.key:/certs/ci-cert.key:ro
        --device=/dev/kfd
        --device=/dev/dri
        --group-add video
        --cap-add=SYS_PTRACE
        --security-opt seccomp=unconfined
        --shm-size 16G
    defaults:
      run:
        working-directory: rocm-jax/jax_rocm_plugin
    steps:
      - name: Checkout JAX repo
        uses: actions/checkout@v4
        with:
          path: jax

      - name: Checkout rocm-jax plugin repo
        uses: actions/checkout@v4
        with:
          repository: ROCm/rocm-jax
          path: rocm-jax

      - name: Copy RBE certificates
        run: |
          cp /certs/ci-cert.crt ci-cert.crt
          cp /certs/ci-cert.key ci-cert.key

      - name: Info
        working-directory: /
        run: |
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          ls -alsh "${GITHUB_WORKSPACE}"
          ls -alsh "${GITHUB_WORKSPACE}/jax" || echo "jax/ not found"
          ls -alsh "${GITHUB_WORKSPACE}/rocm-jax" || echo "rocm-jax/ not found"

      - name: ROCm Info
        run: /opt/rocm/bin/rocminfo

      - name: Run single-GPU unit tests
        if: always()
        run: |
          bash build/rocm/ci_run_jax_ut.sh \
            --config=rocm_sgpu \
            --config=rocm_rbe \
            --override_repository=jax=${GITHUB_WORKSPACE}/jax \
            --repo_env=HERMETIC_PYTHON_VERSION=${{ matrix.mode.python_version }} \
            ${{ matrix.mode.config }} \
            --curses=no \
            --color=yes \
            -- \
            @jax//tests:gpu_tests \
            @jax//tests:backend_independent_tests \
            $(build/rocm/targets_to_ignore.sh)

      - name: Run multi-GPU unit tests
        if: always()
        run: |
          bash build/rocm/ci_run_jax_ut.sh \
            --config=rocm_mgpu \
            --config=rocm_rbe \
            --override_repository=jax=${GITHUB_WORKSPACE}/jax \
            --repo_env=HERMETIC_PYTHON_VERSION=${{ matrix.mode.python_version }} \
            ${{ matrix.mode.config }} \
            --curses=no \
            --color=yes \
            --strategy=TestRunner=local \
            -- \
            @jax//tests:gpu_tests \
            @jax//tests:backend_independent_tests \
            $(build/rocm/targets_to_ignore.sh)

      - name: Upload logs to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-rbe-py${{ matrix.mode.name }}
          path: rocm-jax/jax_rocm_plugin/logs/
