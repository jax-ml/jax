name: Bazel CUDA

on:
  workflow_dispatch:
    inputs:
      halt-for-connection:
        description: 'Should this workflow run wait for a remote connection?'
        type: choice
        required: true
        default: 'no'
        options:
        - 'yes'
        - 'no'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main/release branches.
  cancel-in-progress: ${{ !contains(github.ref, 'release/') && github.ref != 'main' }}
permissions: {}
jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.any_changed == 'true' || github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: filter
        if: github.event_name == 'pull_request'
        with:
          files: |
            jax/**
            jaxlib/**
            third_party/**
            BUILD
            *.bzl
            WORKSPACE*
            .github/workflows/bazel_cuda_presubmit.yml
            .github/workflows/build_artifacts.yml
            .github/workflows/bazel_cuda.yml

  build-cuda-artifacts:
    needs: check-paths
    if: github.repository_owner == 'jax-ml'
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the CUDA tests job below
          runner: ["linux-x86-n4-16"]
          artifact: ["jax-cuda-plugin", "jax-cuda-pjrt"]
          python: ["3.14",]
          cuda-version: ["13"]
    name: "${{ matrix.runner && 'Build wheels' }}"
    with:
      should-run: ${{ needs.check-paths.outputs.should-run }}
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      clone_main_xla: 0
      upload_artifacts_to_gcs: false

  run-tests:
    needs: check-paths
    if: github.event.repository.fork == false && github.repository_owner == 'jax-ml'
    uses: ./.github/workflows/bazel_cuda.yml
# Begin Presubmit Naming Check - name modification requires internal check to be updated
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Note: For testing external dependencies updates, change the python values
          # add 3.13 and 3.13-nogil here when debugging.
          python: ["3.12", "3.14"]
          runner: ["linux-x86-n4-16"]
          jaxlib-version: ["head", "pypi_latest"]
          enable-x64: [1, 0]
          cuda-version: ["12", "13"]
          exclude:
            # Exclude x64=1 on the oldest Python and x64=0 on the newest Python. As long as we have
            # coverage for one of each, we don't need to run both.
            - python: "3.12"
              enable-x64: 1
            - python: "3.12"
              enable-x64: 0
              jaxlib-version: "head"
            - python: "3.12"
              enable-x64: 0
              jaxlib-version: "pypi_latest"
              cuda-version: "13"
            - python: "3.14"
              enable-x64: 0
            - python: "3.14"
              enable-x64: 1
              jaxlib-version: "pypi_latest"
            # Exclude CUDA 12 on jaxlib head because it's too slow.
            - cuda-version: "12"
              jaxlib-version: "head"
    name: "${{ matrix.runner && 'Test' }}"
# End Presubmit Naming Check github-cuda-presubmits
    with:
      should-run: ${{ needs.check-paths.outputs.should-run }}
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      download-jax-from-gcs: 0
      skip-download-jaxlib-and-plugins-from-gcs: 0
      jaxlib-version: ${{ matrix.jaxlib-version }}
      halt-for-connection: ${{ inputs.halt-for-connection }}
      cuda-version: ${{ matrix.cuda-version }}
      enable-x64:  ${{ matrix.enable-x64 }}
      # NOTE: For debugging wheel test change build_jaxlib and build_jax to 'wheel'.
      build_jaxlib: ${{ (matrix.jaxlib-version == 'head' && 'true') || 'false' }}
      build_jax: ${{ 'true' }}
      run_tests_with_rbe: ${{ 'true' }}
      build_artifacts_with_rbe: ${{ 'true' }}
      clone_main_xla: 0
