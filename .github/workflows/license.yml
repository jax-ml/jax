name: License

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  license-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    timeout-minutes: 10
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Set up Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
      - name: "Run license check"
        uses: google-ml-infra/actions/ci_check_license@432d36c6ac62d76fa99b3679758ccfbc10140fb6
        with:
          copyright-holder: "The JAX Authors"
          license-type: "apache"
          exclude-extensions: "toml yml yaml"
          exclude-paths: "jax/_src/third_party/ docs/_static/ third_party/ tests/third_party/"
