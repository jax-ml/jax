name: Mosaic GPU B200 Presubmit

on:
  workflow_dispatch:
    inputs:
      halt-for-connection:
        description: 'Should this workflow run wait for a remote connection?'
        type: choice
        required: true
        default: 'no'
        options:
        - 'yes'
        - 'no'
      python_version:
        description: 'Hermetic Python version for tests (major.minor).'
        type: string
        required: true
        default: '3.14'
      xla_track:
        description: 'XLA revision used by tests.'
        type: choice
        required: true
        default: 'head'
        options:
        - 'pinned'
        - 'head'
  pull_request:
    branches:
      - main

permissions: {}

# - For PRs, group by PR number and cancel stale in-progress runs.
# - For workflow_dispatch events, group by actor+ref. Cancel stale in-progress runs from the same
#   actor on the same ref.
concurrency:
  group: >-
    ${{ github.workflow }}-
    ${{
        (github.event_name == 'pull_request'
         && format('pr-{0}', github.event.pull_request.number))

        || (github.event_name == 'workflow_dispatch'
            && format('dispatch-{0}-{1}', github.actor, github.ref))

        || format('ref-{0}', github.ref)
    }}
  cancel-in-progress: >-
    ${{
        github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    }}

defaults:
  run:
    shell: bash

jobs:
  # The `changed_files` job is used in place of `pull_request.paths` as
  # a workaround, in order to report a status to Copybara,
  # be it success, failure, or simply skipped.
  #
  # `pull_request.paths` cannot be used here as it wouldn't trigger the workflow
  # at all if no matching files were touched.
  # This would lead to Copybara waiting for the status indefinitely.
  changed_files:
    runs-on: ubuntu-latest  # Do not run tj-actions on self-hosted runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      # Only run this if it is a pull request
      - name: Get and filter changed files
        if: ${{ github.event_name == 'pull_request' }}
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323  # v47.0.5
        with:
          files: |
            .github/workflows/bazel_cuda_b200_mosaic_presubmit.yml
            ci/run_bazel_cuda_targeted_tests.sh
            jax/_src/pallas/mosaic_gpu/**
            jax/experimental/mosaic/gpu/**
            jaxlib/mosaic/dialect/gpu/**
            jaxlib/mosaic/gpu/**
      - name: Report skipped test reason
        # Display a notice in the workflow summary about skipping tests.
        if: github.event_name == 'pull_request'
            && steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo '::notice title=Mosaic B200 presubmit::Skipping tests - no relevant files changed in this PR.'
          {
            echo '### PR testing skipped'
            echo ''
            echo 'No files matched the Mosaic B200 presubmit filter in this pull request.'
          } >> "$GITHUB_STEP_SUMMARY"
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed || 'false' }}

  run_tests:
    needs: changed_files
    if: github.event_name == 'workflow_dispatch'
        || needs.changed_files.outputs.any_changed == 'true'
    runs-on: linux-x86-a4-224-b200-1gpu
    container: 'us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest'
    timeout-minutes: 15  # Stop potential hangs from keeping the job running too long.
    name: Mosaic GPU B200 tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Wait For Connection
        uses: google-ml-infra/actions/ci_connection@9f8d7d8d9954430d0fef4a8cce2cb4e3844c200d
        with:
          halt-dispatch-input: ${{ inputs.halt-for-connection }}
      - name: Run Tests
        env:
          JAXCI_HERMETIC_PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.14' }}
          JAXCI_XLA_TRACK: ${{ github.event.inputs.xla_track || 'head' }}
          # Only a couple of targets that run in under 10 minutes.
          JAXCI_BAZEL_TARGETS: |
            //tests/mosaic:gpu_test_gpu
          # TODO(belitskiy): Re-enable once it's clear the workflow *never* stalls > 10 mins.
          #  //tests/pallas:mosaic_gpu_test_gpu
          JAXCI_TEST_TAG_FILTERS: '-multiaccelerator'
          JAXCI_USE_PARALLEL_ACCELERATOR_RUNNER: '1'
          JAXCI_LOCAL_TEST_JOBS: '8'
          JAXCI_TEST_TIMEOUT: '420'
        run: bash ./ci/run_bazel_cuda_targeted_tests.sh
