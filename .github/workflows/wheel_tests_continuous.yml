# CI - Wheel Tests (CUDA XLA Suspect)
#
# Temporary presubmit variant of the continuous wheel workflow for the CUDA/XLA
# regression investigation. It builds only the Linux x86 artifacts needed for
# the H100/L4 CUDA pytest jobs and the targeted L4 CUDA Bazel job below.

name: CI - Wheel Tests (CUDA XLA Suspect)
permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch: # allows triggering the workflow run manually

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'release/') && github.ref != 'main' }}

jobs:
  build-jax-artifact:
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false
        matrix:
          revert-cuda-oom-commit: ["1", "0"]
    name: "Build jax artifact (revert CUDA OOM=${{ matrix.revert-cuda-oom-commit }})"
    with:
        # Note that since jax is a pure python package, the runner OS and Python values do not
        # matter. In addition, cloning main XLA also has no effect.
        runner: "linux-x86-n4-16"
        artifact: "jax"
        revert-cuda-oom-commit: ${{ matrix.revert-cuda-oom-commit }}
        upload_artifacts_to_gcs: true
        gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}/xla-revert-${{ matrix.revert-cuda-oom-commit }}'

  build-jaxlib-artifact:
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          include:
            # Runner OS and Python values need to match the CUDA suspect test matrix below.
            - runner: "linux-x86-n4-16"
              artifact: "jaxlib"
              python: "3.11"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jaxlib"
              python: "3.11"
              revert-cuda-oom-commit: "0"
            - runner: "linux-x86-n4-16"
              artifact: "jaxlib"
              python: "3.12"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jaxlib"
              python: "3.13"
              revert-cuda-oom-commit: "1"
    # Note: For reasons unknown, Github actions groups jobs with the same top-level name in the
    # dashboard only if we use an expression in the "name" field. Otherwise, it appends the matrix
    # values to the name and creates a separate entry for each matrix combination.
    name: "Build ${{ format('{0}', 'jaxlib') }} artifacts"
    with:
        runner: ${{ matrix.runner }}
        artifact: ${{ matrix.artifact }}
        python: ${{ matrix.python }}
        clone_main_xla: 1
        revert-cuda-oom-commit: ${{ matrix.revert-cuda-oom-commit }}
        upload_artifacts_to_gcs: true
        gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}/xla-revert-${{ matrix.revert-cuda-oom-commit }}'

  build-cuda-artifacts:
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          include:
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-plugin"
              python: "3.11"
              cuda-version: "13"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-pjrt"
              python: "3.11"
              cuda-version: "13"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-plugin"
              python: "3.11"
              cuda-version: "13"
              revert-cuda-oom-commit: "0"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-pjrt"
              python: "3.11"
              cuda-version: "13"
              revert-cuda-oom-commit: "0"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-plugin"
              python: "3.12"
              cuda-version: "13"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-pjrt"
              python: "3.12"
              cuda-version: "13"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-plugin"
              python: "3.13"
              cuda-version: "12"
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-n4-16"
              artifact: "jax-cuda-pjrt"
              python: "3.13"
              cuda-version: "12"
              revert-cuda-oom-commit: "1"
    name: "Build ${{ format('{0}', 'CUDA') }} artifacts"
    with:
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      clone_main_xla: 1
      revert-cuda-oom-commit: ${{ matrix.revert-cuda-oom-commit }}
      upload_artifacts_to_gcs: true
      gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}/xla-revert-${{ matrix.revert-cuda-oom-commit }}'

  run-pytest-cpu:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ false }}
    needs: [build-jax-artifact, build-jaxlib-artifact]
    uses: ./.github/workflows/pytest_cpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Runner OS and Python values need to match the matrix stategy in the
          # build_jaxlib_artifact job above
          runner: ["linux-x86-n4-64", "linux-arm64-t2a-48", "windows-x86-n2-64"]
          python: ["3.11",]
          enable-x64: [1, 0]
    name: "Pytest CPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      enable-x64:  ${{ matrix.enable-x64 }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}

  run-pytest-cuda:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ !cancelled() }}
    needs: [build-jax-artifact, build-jaxlib-artifact, build-cuda-artifacts]
    uses: ./.github/workflows/pytest_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          include:
            - runner: "linux-x86-a3-8g-h100-8gpu"
              python: "3.11"
              cuda:
                version: "13"
                use-nvidia-pip-wheels: true
              enable-x64: 0
              revert-cuda-oom-commit: "1"
            - runner: "linux-x86-a3-8g-h100-8gpu"
              python: "3.11"
              cuda:
                version: "13"
                use-nvidia-pip-wheels: true
              enable-x64: 0
              revert-cuda-oom-commit: "0"
            - runner: "linux-x86-g2-48-l4-4gpu"
              python: "3.12"
              cuda:
                version: "13"
                use-nvidia-pip-wheels: true
              enable-x64: 0
              revert-cuda-oom-commit: "1"

    name: "Pytest CUDA (JAX artifacts version = ${{ format('{0}', 'head') }}, CUDA Pip packages = ${{ matrix.cuda.use-nvidia-pip-wheels }}, revert CUDA OOM=${{ matrix.revert-cuda-oom-commit }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version:  ${{ matrix.cuda.version }}
      use-nvidia-pip-wheels: ${{ matrix.cuda.use-nvidia-pip-wheels }}
      enable-x64:  ${{ matrix.enable-x64 }}
      gcs_download_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}/xla-revert-${{ matrix.revert-cuda-oom-commit }}'

  run-bazel-test-cpu-py-import:
    if: ${{ false }}
    uses: ./.github/workflows/bazel_cpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          runner: ["linux-x86-n4-16", "linux-arm64-t2a-48", "windows-x86-n2-16"]
          python: ["3.11",]
          enable-x64: [1, 0]
    name: "Bazel CPU tests with ${{ format('{0}', 'build_jaxlib=wheel') }}"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      enable-x64:  ${{ matrix.enable-x64 }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      clone_main_xla: 1

  run-bazel-test-cuda:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ !cancelled() }}
    needs: [build-jax-artifact, build-jaxlib-artifact, build-cuda-artifacts]
    uses: ./.github/workflows/bazel_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          include:
            - runner: "linux-x86-g2-48-l4-4gpu"
              python: "3.13"
              cuda-version: "12"
              jaxlib-version: "head"
              enable-x64: 0
              revert-cuda-oom-commit: "1"
    name: "Bazel CUDA Non-RBE with build_jaxlib=false, (jax version = ${{ format('{0}', 'head') }}, revert CUDA OOM=${{ matrix.revert-cuda-oom-commit }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      enable-x64:  ${{ matrix.enable-x64 }}
      jaxlib-version: ${{ matrix.jaxlib-version }}
      gcs_download_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}/xla-revert-${{ matrix.revert-cuda-oom-commit }}'
      build_jaxlib: ${{ 'false' }}
      build_jax: ${{ 'false' }}
      write_to_bazel_remote_cache: 1
      run_tests_with_rbe: ${{ 'false' }}
      build_artifacts_with_rbe: ${{ 'false' }}
      clone_main_xla: 1
      revert-cuda-oom-commit: ${{ matrix.revert-cuda-oom-commit }}
      bazel-test-targets: "//tests:fused_attention_stablehlo_test_gpu"

  run-bazel-test-cuda-py-import:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ false }}
    uses: ./.github/workflows/bazel_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the build artifacts job above
          runner: ["linux-x86-g2-48-l4-4gpu",]
          python: ["3.11"]
          cuda-version: ["12", "13"]
          enable-x64: [1]
    name: "Bazel CUDA Non-RBE with ${{ format('{0}', 'build_jaxlib=wheel') }}"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      enable-x64:  ${{ matrix.enable-x64 }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      jaxlib-version: "head"
      write_to_bazel_remote_cache: 1
      run_tests_with_rbe: ${{ 'false' }}
      build_artifacts_with_rbe: ${{ 'true' }}
      clone_main_xla: 1

  run-pytest-tpu:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ false }}
    needs: [build-jax-artifact, build-jaxlib-artifact]
    uses: ./.github/workflows/pytest_tpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          python: ["3.11"]
          tpu-specs: [
            # {type: "v3-8", cores: "4"}, # Enable when we have the v3 type available
            {type: "v5e-8", cores: "8", runner: "linux-x86-ct5lp-224-8tpu"},
            {type: "v6e-8", cores: "8", runner: "linux-x86-ct6e-180-8tpu"},
            {type: "v7x-8", cores: "4", runner: "linux-x86-tpu7x-224-4tpu"}
          ]
          libtpu-version-type: ["nightly"]
    name: "Pytest TPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.tpu-specs.runner }}
      cores: ${{ matrix.tpu-specs.cores }}
      tpu-type: ${{ matrix.tpu-specs.type }}
      python: ${{ matrix.python }}
      run-full-tpu-test-suite: "1"
      libtpu-version-type: ${{ matrix.libtpu-version-type }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}

  run-bazel-test-tpu:
    # Run test jobs even if the build job fails. Avoids losing test coverage if a single unrelated
    # build job fails. E.g Windows build job fails but everything else succeeds. In this case, we
    # still want to run the tests for other platforms.
    if: ${{ false }}
    uses: ./.github/workflows/bazel_test_tpu.yml
    needs: [build-jaxlib-artifact]
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          python: ["3.11"]
          tpu-specs: [
            {type: "v4-8", cores: "4", runner: "linux-x86-ct4p-240-4tpu"},
            {type: "v5e-8", cores: "8", runner: "linux-x86-ct5lp-224-8tpu"},
            {type: "v7x-8", cores: "4", runner: "linux-x86-tpu7x-224-4tpu"},
          ]
          libtpu-version-type: ["nightly"]
    name: "Bazel tests TPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.tpu-specs.runner }}
      cores: ${{ matrix.tpu-specs.cores }}
      tpu-type: ${{ matrix.tpu-specs.type }}
      python: ${{ matrix.python }}
      run-full-tpu-test-suite: "1"
      libtpu-version-type: ${{ matrix.libtpu-version-type }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      clone_main_xla: 1

  build-rocm-artifacts:
    if: ${{ false }}
    uses: ./.github/workflows/build_rocm_artifacts.yml
    permissions:
      id-token: write
      contents: read
      actions: read
    strategy:
        fail-fast: false
        matrix:
          runner: ["linux-x86-64-1gpu-amd"]
          artifact: ["jax-rocm-plugin", "jax-rocm-pjrt"]
          python: ["3.11", "3.12", "3.13", "3.14"]
          rocm-version: ["7"]
          exclude:
            - artifact: "jax-rocm-pjrt"
              python: "3.12"
            - artifact: "jax-rocm-pjrt"
              python: "3.13"
            - artifact: "jax-rocm-pjrt"
              python: "3.14"
    name: "Build ${{ format('{0}', 'ROCm') }} artifacts"
    with:
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      python: ${{ matrix.python }}
      rocm-version: ${{ matrix.rocm-version }}
      clone_main_xla: 1
      upload_artifacts_to_s3: true
      s3_upload_uri: 's3://jax-ci-amd/rocm-wheels/wheel-tests-continuous/${{ github.run_number }}/${{ github.run_attempt }}'

  run-pytest-rocm:
    if: ${{ false }}
    needs: [build-jax-artifact, build-jaxlib-artifact, build-rocm-artifacts]
    uses: ./.github/workflows/pytest_rocm.yml
    permissions:
      id-token: write
      contents: read
      actions: read
    strategy:
        fail-fast: false
        matrix:
          runner: ["linux-x86-64-1gpu-amd", "linux-x86-64-4gpu-amd", "linux-x86-64-8gpu-amd"]
          python: ["3.11"]
          rocm: [
            {version: "7.2.0", tag: "rocm720"},
          ]
    name: "Pytest ROCm (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      rocm-version: ${{ matrix.rocm.version }}
      rocm-tag: ${{ matrix.rocm.tag }}
      jaxlib-version: "head"
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      s3_download_uri: 's3://jax-ci-amd/rocm-wheels/wheel-tests-continuous/${{ github.run_number }}/${{ github.run_attempt }}'

  run-bazel-test-rocm:
    if: ${{ false }}
    needs: [build-jax-artifact, build-jaxlib-artifact, build-rocm-artifacts]
    uses: ./.github/workflows/bazel_rocm.yml
    permissions:
      id-token: write
      contents: read
      actions: read
    strategy:
        fail-fast: false
        matrix:
          runner: ["linux-x86-64-4gpu-amd", "linux-x86-64-8gpu-amd"]
          python: ["3.11"]
          rocm-version: ["7"]
          enable-x64: [0]
    name: "Bazel ROCm tests (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      rocm-version: ${{ matrix.rocm-version }}
      enable-x64: ${{ matrix.enable-x64 }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      build_jaxlib: ${{ 'false' }}
      build_jax: ${{ 'false' }}
      jaxlib-version: "head"
      run_multiaccelerator_tests: ${{ 'false' }}
      clone_main_xla: 1
