          rocm: [
            {label: "ROCm 7.2.0", wheel-version: "7", release-version: "7.2.0", tag: "rocm720"},
          ]
          enable-x64: [0]
    name: "Bazel ROCm (${{ matrix.rocm.label }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      rocm-version: ${{ matrix.rocm.wheel-version }}
