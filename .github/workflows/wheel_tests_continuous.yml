# CI - Wheel Tests (Continuous)
#
# This workflow builds JAX artifacts and runs CPU/TPU/CUDA/ROCm tests.
#
# It orchestrates the following:
# 1. build-jaxlib-artifact: Calls the `build_artifacts.yml` workflow to build jaxlib and
#                           uploads it to a GCS bucket.
# 2. run-pytest-cpu:        Calls the `pytest_cpu.yml` workflow which downloads the jaxlib wheel
#                           that was built in the previous step and runs CPU tests.
# 3. build-cuda-artifacts:  Calls the `build_artifacts.yml` workflow to build CUDA artifacts and
#                           uploads them to a GCS bucket.
# 4. run-bazel-test-cpu-py-import: Calls the `bazel_cpu_rbe.yml` workflow which
#                           runs Bazel CPU tests with py_import on RBE.
# 5. run-bazel-test-cuda-py-import: Calls the `bazel_cuda.yml` workflow which
#                           runs Bazel CUDA tests with py_import on non-RBE.
# 6. run-pytest-cuda:       Calls the `pytest_cuda.yml` workflow which downloads the jaxlib and CUDA
#                           artifacts that were built in the previous steps and runs the CUDA tests.
# 7. run-bazel-test-cuda:   Calls the `bazel_cuda.yml` workflow which downloads the jaxlib
#                           and CUDA artifacts that were built in the previous steps and runs the
#                           CUDA tests using Bazel.
# 8. run-pytest-tpu:        Calls the `pytest_tpu.yml` workflow which downloads the jaxlib wheel
#                           that was built in the previous step and runs TPU tests.
# 9. run-bazel-test-tpu:    Calls the `bazel_test_tpu.yml` workflow which
#                           runs Bazel TPU tests with py_import.
# 10. build-rocm-artifacts: Calls the `build_rocm_artifacts.yml` workflow to build ROCm plugin/pjrt
#                           wheels and uploads them to an S3 bucket.
# 11. run-pytest-rocm:      Calls the `pytest_rocm.yml` workflow which downloads the jaxlib and
#                           ROCm artifacts and runs the ROCm tests.
# 12. run-bazel-test-rocm:  Calls the `bazel_rocm.yml` workflow which runs the ROCm Bazel tests.

name: CI - Wheel Tests (Continuous)
permissions:
  contents: read
  actions: read

on:
  schedule:
    - cron: "0 */3 * * *" # Run once every 3 hours
  workflow_dispatch: # allows triggering the workflow run manually
    inputs:
      halt-for-connection:
        description: 'Jobs to wait for connection: none or comma-separated non-ROCm job IDs, e.g. run_bazel_test_cuda.'
        type: string
        required: true
        default: 'none'
      platforms:
        description: 'Platforms to run: all, all-non-rocm, or comma-separated cpu,cuda,tpu,rocm. Custom XLA requires excluding rocm.'
        type: string
        required: true
        default: 'all'
      suites:
        description: 'Suites to run: all or comma-separated pytest,bazel.'
        type: string
        required: true
        default: 'all'
      xla_track:
        description: 'XLA revision for build/Bazel jobs. Use platforms=all-non-rocm for head/commit; pypi_latest legs use PyPI wheels.'
        type: choice
        required: true
        default: 'pinned'
        options:
        - 'pinned'
        - 'head'
        - 'commit'
      xla_commit:
        description: 'XLA commit SHA used when xla_track is "commit".'
        type: string
        required: false
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'release/') && github.ref != 'main' }}

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      run-build-bazel: ${{ steps.determine.outputs.run-build-bazel }}
      run-pytest: ${{ steps.determine.outputs.run-pytest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            build
            .github
          persist-credentials: false

      - name: Determine triggers
        id: determine
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run-build-bazel=true" >> "$GITHUB_OUTPUT"
            echo "run-pytest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run-pytest=false" >> "$GITHUB_OUTPUT"

          # PR runs only exercise build/Bazel jobs; pytest jobs are disabled for PRs.
          TRIGGER_PATTERNS=(
            "build/requirements_lock_*.txt"
            ".github/workflows/wheel_tests_continuous.yml"
            ".github/workflows/scripts/select_continuous_wheel_test_jobs.py"
            ".github/workflows/bazel_cpu.yml"
            ".github/workflows/bazel_cuda.yml"
            ".github/workflows/bazel_rocm.yml"
            ".github/workflows/bazel_test_tpu.yml"
            ".github/workflows/build_artifacts.yml"
            ".github/workflows/build_rocm_artifacts.yml"
            ".github/actions/download-jax-*-wheels/action.yml"
          )

          git fetch --depth=1 origin "$BASE_REF"

          # Diff only against the specified patterns.
          CHANGED_FILES=$(git diff --name-only origin/"$BASE_REF" HEAD -- "${TRIGGER_PATTERNS[@]}")

          RUN_BUILD_BAZEL="false"
          if [ -n "$CHANGED_FILES" ]; then
            echo "Triggering files modified in this PR:"
            echo "$CHANGED_FILES"
            RUN_BUILD_BAZEL="true"
          else
            echo "No triggering files modified in this PR."
          fi

          echo "run-build-bazel=$RUN_BUILD_BAZEL" >> "$GITHUB_OUTPUT"

  select-jobs:
    needs: [check-trigger]
    if: github.repository_owner == 'jax-ml' || github.repository_owner == 'ROCm'
    runs-on: ubuntu-latest
    outputs:
      selected_jobs: ${{ steps.select.outputs.selected_jobs }}
      required_builds: ${{ steps.select.outputs.required_builds }}
      halt_for_connection_jobs: ${{ steps.select.outputs.halt_for_connection_jobs }}
      clone_main_xla: ${{ steps.select.outputs.clone_main_xla }}
      xla_commit: ${{ steps.select.outputs.xla_commit }}
    steps:
      - name: Checkout selector script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: .github/workflows/scripts
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Select jobs
        id: select
        env:
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || (github.event_name == 'pull_request' && 'all-non-rocm') || 'all' }}
          INPUT_SUITES: ${{ github.event.inputs.suites || 'all' }}
          INPUT_XLA_TRACK: ${{ github.event.inputs.xla_track || 'pinned' }}
          INPUT_XLA_COMMIT: ${{ github.event.inputs.xla_commit }}
          INPUT_HALT_FOR_CONNECTION: ${{ github.event.inputs['halt-for-connection'] || 'none' }}
          INPUT_RUN_BUILD_BAZEL: ${{ needs.check-trigger.outputs.run-build-bazel }}
          INPUT_RUN_PYTEST: ${{ needs.check-trigger.outputs.run-pytest }}
        run: python3 .github/workflows/scripts/select_continuous_wheel_test_jobs.py

  build-jax-artifact:
    needs: [select-jobs]
    if: >-
      ${{
          fromJSON(needs.select-jobs.outputs.required_builds || '{}').build_jax_artifact == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/build_artifacts.yml
    name: "Build jax artifact"
    with:
        # Note that since jax is a pure python package, the runner OS and Python values do not
        # matter. In addition, cloning main XLA also has no effect.
        runner: "linux-x86-n4-16"
        artifact: "jax"
        clone_main_xla: 0
        halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').build_jax_artifact || 'no' }}
        upload_artifacts_to_gcs: true
        gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}'

  build-jaxlib-artifact:
    needs: [select-jobs]
    if: >-
      ${{
          fromJSON(needs.select-jobs.outputs.required_builds || '{}').build_jaxlib_artifact == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
            # Runner OS and Python values need to match the matrix stategy in the CPU tests job
            runner: ["linux-x86-n4-16", "linux-arm64-t2a-48", "windows-x86-n2-16"]
            artifact: ["jaxlib"]
            python: ["3.12"]
    # Note: For reasons unknown, Github actions groups jobs with the same top-level name in the
    # dashboard only if we use an expression in the "name" field. Otherwise, it appends the matrix
    # values to the name and creates a separate entry for each matrix combination.
    name: "Build ${{ format('{0}', 'jaxlib') }} artifacts"
    with:
        runner: ${{ matrix.runner }}
        artifact: ${{ matrix.artifact }}
        python: ${{ matrix.python }}
        clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
        xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
        halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').build_jaxlib_artifact || 'no' }}
        upload_artifacts_to_gcs: true
        gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}'

  build-cuda-artifacts:
    needs: [select-jobs]
    if: >-
      ${{
          fromJSON(needs.select-jobs.outputs.required_builds || '{}').build_cuda_artifacts == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/build_artifacts.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the CUDA tests job below
          runner: ["linux-x86-n4-16"]
          artifact: ["jax-cuda-plugin", "jax-cuda-pjrt"]
          python: ["3.12",]
          cuda-version: ["12", "13"]
    name: "Build ${{ format('{0}', 'CUDA') }} artifacts"
    with:
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
      xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').build_cuda_artifacts || 'no' }}
      upload_artifacts_to_gcs: true
      gcs_upload_uri: 'gs://general-ml-ci-transient/jax-github-actions/jax/${{ github.workflow }}/${{ github.run_number }}/${{ github.run_attempt }}'

  # LINT.IfChange(run_pytest_cpu)
  run-pytest-cpu:
    needs: [select-jobs, build-jax-artifact, build-jaxlib-artifact]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_pytest_cpu)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_pytest_cpu == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/pytest_cpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Runner OS and Python values need to match the matrix stategy in the
          # build_jaxlib_artifact job above
          runner: ["linux-x86-n4-64", "linux-arm64-t2a-48", "windows-x86-n2-64"]
          python: ["3.12",]
          enable-x64: [1, 0]
    name: "Pytest CPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      enable-x64:  ${{ matrix.enable-x64 }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_pytest_cpu || 'no' }}

  # LINT.IfChange(run_pytest_cuda)
  run-pytest-cuda:
    needs: [select-jobs, build-jax-artifact, build-jaxlib-artifact, build-cuda-artifacts]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_pytest_cuda)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_pytest_cuda == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/pytest_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the artifact build jobs above
          # See exlusions for what is fully tested
          runner: ["linux-x86-g2-48-l4-4gpu", "linux-x86-a3-8g-h100-8gpu", "linux-x86-a4-224-b200-1gpu"]
          python: ["3.12",]
          cuda: [
            {version: "12.1", use-nvidia-pip-wheels: false},
            {version: "12.9", use-nvidia-pip-wheels: true},
            {version: "13", use-nvidia-pip-wheels: true},
            ]
          enable-x64: [1, 0]
          exclude:
            # H100 runs only a single config, CUDA 12.9 Enable x64 1
            - runner: "linux-x86-a3-8g-h100-8gpu"
              cuda:
                version: "12.1"
            - runner: "linux-x86-a3-8g-h100-8gpu"
              enable-x64: "0"
            # B200 runs only a single config, CUDA 12.9 Enable x64 1
            - runner: "linux-x86-a4-224-b200-1gpu"
              cuda:
                version: "12.1"
            - runner: "linux-x86-a4-224-b200-1gpu"
              enable-x64: "0"

    name: "Pytest CUDA (JAX artifacts version = ${{ format('{0}', 'head') }}, CUDA Pip packages = ${{ matrix.cuda.use-nvidia-pip-wheels }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version:  ${{ matrix.cuda.version }}
      use-nvidia-pip-wheels: ${{ matrix.cuda.use-nvidia-pip-wheels }}
      enable-x64:  ${{ matrix.enable-x64 }}
      # GCS upload URI is the same for both artifact build jobs
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_pytest_cuda || 'no' }}

  # LINT.IfChange(run_bazel_test_cpu_py_import)
  run-bazel-test-cpu-py-import:
    needs: [select-jobs]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_bazel_test_cpu_py_import)
    if: >-
      ${{
          fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_bazel_test_cpu_py_import == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/bazel_cpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          runner: ["linux-x86-n4-16", "linux-arm64-t2a-48", "windows-x86-n2-16"]
          python: ["3.12",]
          enable-x64: [1, 0]
    name: "Bazel CPU tests with ${{ format('{0}', 'build_jaxlib=wheel') }}"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      enable-x64:  ${{ matrix.enable-x64 }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
      xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_bazel_test_cpu_py_import || 'no' }}

  # LINT.IfChange(run_bazel_test_cuda)
  run-bazel-test-cuda:
    needs: [select-jobs, build-jax-artifact, build-jaxlib-artifact, build-cuda-artifacts]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_bazel_test_cuda)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_bazel_test_cuda == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/bazel_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the build artifacts job above
          runner: ["linux-x86-g2-48-l4-4gpu",]
          python: ["3.12",]
          cuda-version: ["12", "13"]
          jaxlib-version: ["head", "pypi_latest"]
          enable-x64: [1, 0]
    name: "Bazel CUDA Non-RBE with build_jaxlib=false, (jax version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      enable-x64:  ${{ matrix.enable-x64 }}
      jaxlib-version: ${{ matrix.jaxlib-version }}
      # GCS upload URI is the same for both artifact build jobs
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      build_jaxlib: ${{ 'false' }}
      build_jax: ${{ 'false' }}
      write_to_bazel_remote_cache: 1
      run_tests_with_rbe: ${{ 'false' }}
      build_artifacts_with_rbe: ${{ 'false' }}
      clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
      xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_bazel_test_cuda || 'no' }}

  # LINT.IfChange(run_bazel_test_cuda_py_import)
  run-bazel-test-cuda-py-import:
    needs: [select-jobs]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_bazel_test_cuda_py_import)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_bazel_test_cuda_py_import == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/bazel_cuda.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          # Python values need to match the matrix stategy in the build artifacts job above
          runner: ["linux-x86-g2-48-l4-4gpu",]
          python: ["3.12"]
          cuda-version: ["12", "13"]
          enable-x64: [1]
    name: "Bazel CUDA Non-RBE with ${{ format('{0}', 'build_jaxlib=wheel') }}"
    with:
      runner: ${{ matrix.runner }}
      python: ${{ matrix.python }}
      cuda-version: ${{ matrix.cuda-version }}
      enable-x64:  ${{ matrix.enable-x64 }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      jaxlib-version: "head"
      write_to_bazel_remote_cache: 1
      run_tests_with_rbe: ${{ 'false' }}
      build_artifacts_with_rbe: ${{ 'true' }}
      clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
      xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_bazel_test_cuda_py_import || 'no' }}

  # LINT.IfChange(run_pytest_tpu)
  run-pytest-tpu:
    needs: [select-jobs, build-jax-artifact, build-jaxlib-artifact]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_pytest_tpu)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_pytest_tpu == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/pytest_tpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          python: ["3.12"]
          tpu-specs: [
            # {type: "v3-8", cores: "4"}, # Enable when we have the v3 type available
            {type: "v5e-8", cores: "8", runner: "linux-x86-ct5lp-224-8tpu"},
            {type: "v6e-8", cores: "8", runner: "linux-x86-ct6e-180-8tpu"},
            {type: "v7x-8", cores: "4", runner: "linux-x86-tpu7x-224-4tpu"}
          ]
          libtpu-version-type: ["pinned"]
    name: "Pytest TPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.tpu-specs.runner }}
      cores: ${{ matrix.tpu-specs.cores }}
      tpu-type: ${{ matrix.tpu-specs.type }}
      python: ${{ matrix.python }}
      run-full-tpu-test-suite: "1"
      libtpu-version-type: ${{ matrix.libtpu-version-type }}
      gcs_download_uri: ${{ needs.build-jaxlib-artifact.outputs.gcs_upload_uri }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_pytest_tpu || 'no' }}

  # LINT.IfChange(run_bazel_test_tpu)
  run-bazel-test-tpu:
    needs: [select-jobs]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_bazel_test_tpu)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_bazel_test_tpu == true
          && github.repository_owner == 'jax-ml'
      }}
    uses: ./.github/workflows/bazel_test_tpu.yml
    strategy:
        fail-fast: false # don't cancel all jobs on failure
        matrix:
          python: ["3.12"]
          tpu-specs: [
            {type: "v4-8", cores: "4", runner: "linux-x86-ct4p-240-4tpu"},
            {type: "v5e-8", cores: "8", runner: "linux-x86-ct5lp-224-8tpu"},
            {type: "v7x-8", cores: "4", runner: "linux-x86-tpu7x-224-4tpu"},
          ]
          libtpu-version-type: ["pinned"]
    name: "Bazel tests TPU (JAX artifacts version = ${{ format('{0}', 'head') }})"
    with:
      runner: ${{ matrix.tpu-specs.runner }}
      cores: ${{ matrix.tpu-specs.cores }}
      tpu-type: ${{ matrix.tpu-specs.type }}
      python: ${{ matrix.python }}
      run-full-tpu-test-suite: "1"
      libtpu-version-type: ${{ matrix.libtpu-version-type }}
      build_jaxlib: "wheel"
      build_jax: "wheel"
      clone_main_xla: ${{ needs.select-jobs.outputs.clone_main_xla }}
      xla_commit: ${{ needs.select-jobs.outputs.xla_commit }}
      halt-for-connection: ${{ fromJSON(needs.select-jobs.outputs.halt_for_connection_jobs || '{}').run_bazel_test_tpu || 'no' }}

  build-rocm-artifacts:
    needs: [select-jobs]
    if: >-
      ${{
          fromJSON(needs.select-jobs.outputs.required_builds || '{}').build_rocm_artifacts == true
          && (github.repository_owner == 'jax-ml' || github.repository_owner == 'ROCm')
      }}
    uses: ./.github/workflows/build_rocm_artifacts.yml
    permissions:
      id-token: write
      contents: read
      actions: read
    strategy:
        fail-fast: false
        matrix:
          runner: ["amd-do-linux.jax.gpu.gfx950.1"]
          artifact: ["jax-rocm-plugin", "jax-rocm-pjrt"]
          python: ["3.12", "3.13", "3.14"]
          rocm: [
            {label: "ROCm 7.2.0", wheel-version: "7", release-version: "7.2.0", manylinux-image: ""},
          ]
          exclude:
            - artifact: "jax-rocm-pjrt"
              python: "3.13"
            - artifact: "jax-rocm-pjrt"
              python: "3.14"
    name: "Build ROCm artifacts (${{ matrix.rocm.label }})"
    with:
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      python: ${{ matrix.python }}
      rocm-version: ${{ matrix.rocm.wheel-version }}
      rocm-release-version: ${{ matrix.rocm.release-version }}
      manylinux-image: ${{ matrix.rocm.manylinux-image }}
      clone_main_xla: 0
      halt-for-connection: 'no'
      upload_artifacts_to_s3: true
      s3_upload_uri: 's3://jax-ci-amd/rocm-wheels/${{ github.repository }}/${{ github.ref_name }}/${{ matrix.rocm.release-version }}/wheel-tests-continuous/${{ github.run_number }}/${{ github.run_attempt }}'

  # LINT.IfChange(run_pytest_rocm)
  run-pytest-rocm:
    needs: [select-jobs, build-jax-artifact, build-jaxlib-artifact, build-rocm-artifacts]
  # LINT.ThenChange(.github/workflows/scripts/select_continuous_wheel_test_jobs.py:run_pytest_rocm)
    if: >-
      ${{
          !cancelled()
          && fromJSON(needs.select-jobs.outputs.selected_jobs || '{}').run_pytest_rocm == true
