name: CI - Free-threading and Thread Sanitizer (nightly)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  schedule:
    - cron: "0 5 * * *"  # Daily at 05:00 UTC == 00:00 EST == 21:00 PST
  workflow_dispatch: # allows triggering the workflow run manually
  pull_request: # Automatically trigger on pull requests affecting this file
    branches:
      - main
    paths:
      - '**/workflows/tsan.yaml'
      - '**/workflows/tsan-suppressions*.txt'
permissions: {}

env:
  UV_DEFAULT_INDEX: "https://us-python.pkg.dev/ml-oss-artifacts-published/pypi-mirror/simple"
  PIP_INDEX_URL: "https://us-python.pkg.dev/ml-oss-artifacts-published/pypi-mirror/simple"

jobs:
  tsan:
    if: github.repository_owner == 'jax-ml'
    runs-on: linux-x86-n4-64
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build@sha256:ea67e8453d8b09c2ba48853da5e79efef4b65804b4a48dfae4b4da89ffd38405 # ml-build container (based on Ubuntu 22.04)
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: jax
          persist-credentials: false
      - name: Get pinned NumPy version
        id: numpy-version
        run: |
          NUMPY_VER=$(grep -m1 -E '^numpy==' jax/build/requirements_lock_3_14_ft.txt | cut -d'=' -f3 | cut -d' ' -f1 | tr -d ' \n\r')
          echo "version=v${NUMPY_VER}" >> "$GITHUB_OUTPUT"
          echo "Targeting NumPy release tag: v${NUMPY_VER}"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: numpy/numpy
          ref: ${{ steps.numpy-version.outputs.version }}
          path: numpy
          submodules: true
          persist-credentials: false
      - name: Get year & week number
        id: get-date
        run: echo "date=$(/bin/date "+%Y-%U")" >> "$GITHUB_OUTPUT"
        shell: bash -l {0}
      - name: Restore cached TSAN Numpy
        id: cache-numpy-tsan-restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ./wheelhouse
          key: ${{ runner.os }}-numpy-tsan-3.14-${{ hashFiles('numpy/pyproject.toml') }}-${{ steps.get-date.outputs.date }}
      - name: Install Clang TSAN runtime
        if: steps.cache-numpy-tsan-restore.outputs.cache-hit != 'true'
        run: |
          apt update
          apt install -y libclang-rt-18-dev
      - name: Build TSAN Numpy wheel
        if: steps.cache-numpy-tsan-restore.outputs.cache-hit != 'true'
        run: |
          set -eux
          cd numpy

          # Download and extract the prebuilt TSAN CPython tarball from GCS
          curl -sSL -o "${GITHUB_WORKSPACE}/cpython-tsan.tar.gz" https://storage.googleapis.com/ml-sysroot-testing/python/cpython-3.14.x-tsan-shared-linux-x86_64-llvm-18.1.8.tar.gz
          mkdir -p "${GITHUB_WORKSPACE}/cpython-tsan"
          tar -xzf "${GITHUB_WORKSPACE}/cpython-tsan.tar.gz" -C "${GITHUB_WORKSPACE}/cpython-tsan" --strip-components=1
          export PATH="${GITHUB_WORKSPACE}/cpython-tsan/bin:$PATH"

          python3 -m pip install uv~=0.5.30
          python3 -m uv pip install -r requirements/build_requirements.txt

          CC=clang-18 CXX=clang++-18 python3 -m pip wheel --wheel-dir dist -v . --no-build-isolation -Csetup-args=-Db_sanitize=thread -Csetup-args=-Db_lundef=false -Csetup-args=-Dbuildtype=debugoptimized

          # Copy the built wheel to wheelhouse for caching
          mkdir -p "${GITHUB_WORKSPACE}/wheelhouse/numpy"
          numpy_whl_path=$(find dist -maxdepth 1 -name "numpy*.whl" | head -n 1)
          if [ -z "${numpy_whl_path}" ]; then exit 1; fi

          echo "Built TSAN Numpy wheel: ${numpy_whl_path}"
          cp "${numpy_whl_path}" "${GITHUB_WORKSPACE}/wheelhouse/numpy/"
      - name: Save TSAN Numpy wheel
        id: cache-numpy-tsan-save
        if: steps.cache-numpy-tsan-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ./wheelhouse
          key: ${{ runner.os }}-numpy-tsan-3.14-${{ hashFiles('numpy/pyproject.toml') }}-${{ steps.get-date.outputs.date }}
      - name: Build Jax and run tests
        timeout-minutes: 180
        env:
          JAX_NUM_GENERATED_CASES: 1
          JAX_ENABLE_X64: true
          JAX_SKIP_SLOW_TESTS: true
          PY_COLORS: 1
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -x
          cd jax

          echo "JAX_NUM_GENERATED_CASES=${JAX_NUM_GENERATED_CASES}"
          echo "JAX_ENABLE_X64=${JAX_ENABLE_X64}"
          echo "JAX_SKIP_SLOW_TESTS=${JAX_SKIP_SLOW_TESTS}"

          mkdir -p dist
          # Check whether we have numpy wheel or exit with error
          find "${GITHUB_WORKSPACE}/wheelhouse/numpy" -maxdepth 1 -name "*.whl" | grep -q . || exit 1
          find "${GITHUB_WORKSPACE}/wheelhouse/numpy" -maxdepth 1 -name "*.whl" -exec cp -v {} dist/ \;

          cat << 'EOF' >> MODULE.bazel
          python.override(minor_mapping = {"3.14": "3.14.3"})
          python.single_version_platform_override(
              platform = "x86_64-unknown-linux-gnu-freethreaded",
              python_version = "3.14.3",
              urls = ["https://storage.googleapis.com/ml-sysroot-testing/python/cpython-3.14.x-tsan-shared-linux-x86_64-llvm-18.1.8.tar.gz"],
              sha256 = "19160bafba950761dea5a3e3f831212cf6aa0d5dc8a0fb13c1caf69c009e853e",
              strip_prefix = "cpython-3.14.x-tsan-shared-linux-x86_64-llvm-18.1.8",
          )
          EOF

          # Build JAX and run tests
          bazel test \
              --repo_env=HERMETIC_PYTHON_VERSION=3.14-ft \
              --repo_env=HERMETIC_PYTHON_URL="https://storage.googleapis.com/ml-sysroot-testing/python/cpython-3.14.x-tsan-shared-linux-x86_64-llvm-18.1.8.tar.gz" \
              --repo_env=HERMETIC_PYTHON_SHA256=19160bafba950761dea5a3e3f831212cf6aa0d5dc8a0fb13c1caf69c009e853e \
              --repo_env=HERMETIC_PYTHON_PREFIX="cpython-3.14.x-tsan-shared-linux-x86_64-llvm-18.1.8/" \
              --verbose_failures \
              --test_env=JAX_NUM_GENERATED_CASES="${JAX_NUM_GENERATED_CASES}" \
              --test_env=JAX_ENABLE_X64="${JAX_ENABLE_X64}" \
              --test_env=JAX_SKIP_SLOW_TESTS="${JAX_SKIP_SLOW_TESTS}" \
              --test_env=PYTHON_GIL=0 \
              --test_env=TSAN_OPTIONS="halt_on_error=1,suppressions=tests/config/tsan-suppressions_3.14.txt" \
              --test_env=JAX_TEST_NUM_THREADS=8 \
              --@rules_python//python/config_settings:py_freethreaded="yes" \
              --test_output=errors \
              --test_timeout=1800 \
              --config=rbe_linux_x86_64 \
              --config=tsan_shared \
              --test_tag_filters=-notsan \
              --run_under=//tests/config:oss_tsan_wrapper_sh \
              //tests:cpu_tests
