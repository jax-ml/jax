# Install the pre-commit hooks below with
# 'pre-commit install'

# Auto-update the version of the hooks with
# 'pre-commit autoupdate'

# Run the hooks on all files with
# 'pre-commit run --all'

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-ast
  - id: check-merge-conflict
  - id: check-toml
  - id: check-yaml
    exclude: |
      (?x)^(
          examples/k8s/svc-acct\.yaml |
          ci/k8s/indexed-job\.yaml
      )$
  - id: end-of-file-fixer
    # only include python files
    files: \.py$
  - id: debug-statements
    # only include python files
    files: \.py$
  - id: trailing-whitespace
    # only include python files
    files: \.py$

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 0470f7c8a653e950f7cc5a653204ceb3fde4c02a  # frozen: v0.15.1
  hooks:
  - id: ruff

- repo: https://github.com/facebook/pyrefly-pre-commit
  rev: f0d6ae09431cf86ecc3dad5d8f323ae04fa81533  # frozen: v0.61.0
  hooks:
    - id: pyrefly-check
      name: Pyrefly (type checking)
      pass_filenames: false
      additional_dependencies:
        - absl-py==2.4.0
        - types-requests~=2.32.0
        - numpy~=2.4.0
        - ml_dtypes~=0.5.0
        - opt-einsum~=3.4.0
        - tensorstore
        - scipy-stubs
        - --pre
        - --extra-index-url
        - https://us-python.pkg.dev/ml-oss-artifacts-published/jax/simple/
        - jaxlib

- repo: https://github.com/mwouts/jupytext
  rev: 8ed836db64ad5d304f2315e6bfd9049c9142e190  # frozen: v1.16.4
  hooks:
  - id: jupytext
    files: docs/
    args: [--sync]

- repo: local
  hooks:
  - id: check-copyright
    name: check copyright notice
    entry: python3 build/check_copyright.py
    language: python
    additional_dependencies: [google-re2]
    files: \.(py|cc|h|c|cu|bzl)$|BUILD
    exclude: ^(jax/_src/third_party/|tests/third_party/)

- repo: https://github.com/rhysd/actionlint
  rev: 393031adb9afb225ee52ae2ccd7a5af5525e03e8  # frozen: v1.7.11
  hooks:
    - id: actionlint
      files: .github/workflows/
